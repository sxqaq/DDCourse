name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Verify release tag and source branch
        shell: pwsh
        run: |
          git fetch origin main --no-tags
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Release commit must belong to the main branch."
          }
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $packageVersion = node -p "require('./package.json').version"
            if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
              throw "Tag $env:GITHUB_REF_NAME does not match package version v$packageVersion."
            }
          }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run type and lint checks
        run: npm run typecheck && npm run lint && npm run desktop:check
      - name: Build web application
        run: npm run build
      - name: Verify offline startup
        run: |
          npx playwright install chromium
          npm run test:e2e
      - name: Verify desktop startup
        run: npm run desktop:smoke
      - name: Build installer
        run: npm run desktop:build
      - name: Verify packaged application
        run: npm run desktop:smoke:packaged
      - name: Prepare version release notes
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $changelog = Get-Content CHANGELOG.md -Raw -Encoding utf8
          $pattern = "(?ms)^## $([regex]::Escape($version))\s+—.*?(?=^## |\z)"
          $notes = [regex]::Match($changelog, $pattern)
          if (-not $notes.Success) {
            throw "CHANGELOG.md is missing release notes for $version."
          }
          $notes.Value.Trim() | Set-Content release/release-notes.md -Encoding utf8NoBOM
      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: DDCourse-Windows
          path: |
            release/DDCourse-Setup-*.exe
            release/DDCourse-Setup-*.exe.blockmap
            release/latest.yml
            release/release-notes.md

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified installer
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: DDCourse-Windows
          path: release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            release/DDCourse-Setup-*.exe
            release/DDCourse-Setup-*.exe.blockmap
            release/latest.yml
          body_path: release/release-notes.md
